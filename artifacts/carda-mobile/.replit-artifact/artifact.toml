kind = "mobile"
previewPath = "/mobile/"
title = "Carda Mobile"
version = "1.0.0"
id = "artifacts/carda-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/mobile/" ]
localPort = 18627

[services.development]
run = "pnpm --filter @workspace/carda-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/carda-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/carda-mobile", "run", "serve" ]

[services.env]
PORT = "18627"
BASE_PATH = "/mobile/"
