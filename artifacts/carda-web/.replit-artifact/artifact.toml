kind = "web"
previewPath = "/"
title = "Carda 2.0"
version = "1.0.0"
id = "artifacts/carda-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21124

[services.development]
run = "pnpm --filter @workspace/carda-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/carda-web", "run", "build" ]
publicDir = "artifacts/carda-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21124"
BASE_PATH = "/"
